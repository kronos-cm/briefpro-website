name: Deploy GitHub Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: false
        default: "main"
      deploy_to_public:
        description: "Deploy to public GitHub Pages"
        type: boolean
        required: true
        default: false

permissions:
  actions: read
  security-events: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run site tests
        run: python -m unittest tests/test_marketing_site.py
      - name: Build site artifact
        run: node tools/site-tool.mjs build --dir _site
      - name: Validate site bundle
        run: node tools/site-tool.mjs validate --dir _site
      - name: Lighthouse checks
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:4173/
            http://127.0.0.1:4173/en/
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1
          configPath: ''
          startServerCommand: node tools/site-tool.mjs serve --dir _site --port 4173

  deploy:
    needs: validate
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_to_public == true
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build site artifact
        run: node tools/site-tool.mjs build --dir _site
      - name: Validate site bundle
        run: node tools/site-tool.mjs validate --dir _site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
