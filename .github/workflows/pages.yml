name: Deploy GitHub Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: false
        default: "main"
      deploy_to_public:
        description: "Deploy to public GitHub Pages"
        type: boolean
        required: true
        default: false

permissions:
  actions: read
  security-events: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run site tests
        run: python -m unittest tests/test_marketing_site.py
      - name: Prepare artifact
        run: |
          mkdir -p _site
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='_site' \
            --exclude='README.md' \
            ./ _site/
      - name: Validate site bundle
        run: |
          set -euo pipefail
          test -f _site/index.html
          test -f _site/en/index.html
          test -f _site/impressum.html
          test -f _site/privacy.html
          test -f _site/styles.css
          test -f _site/assets/briefpro-logo-light.jpg
          test -f _site/assets/briefpro-logo-dark.jpg
      - name: Lighthouse checks
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:4173/
            http://127.0.0.1:4173/en/
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1
          configPath: ''
          startServerCommand: python -m http.server 4173 --directory _site

  deploy:
    needs: validate
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_to_public == true
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare artifact
        run: |
          mkdir -p _site
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='_site' \
            --exclude='README.md' \
            ./ _site/
      - name: Validate site bundle
        run: |
          set -euo pipefail
          test -f _site/index.html
          test -f _site/en/index.html
          test -f _site/impressum.html
          test -f _site/privacy.html
          test -f _site/styles.css
          test -f _site/assets/briefpro-logo-light.jpg
          test -f _site/assets/briefpro-logo-dark.jpg
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
